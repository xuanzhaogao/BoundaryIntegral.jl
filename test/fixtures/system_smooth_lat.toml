name = "system_smooth_lat"
root = "/tmp/system_smooth_lat_unused"
templates = ["orb_smooth.xsf"]

[[orbital]]
type = 1
x = 1.25
y = 1.25
z = 1.25

[[orbital]]
type = 1
x = 2.25
y = 1.25
z = 1.25

[pairing]
neighbor_cutoff = 5.0

[dielectrics]
eps_out = 1.0
boxes = [[1.5, 1.5, 1.5, 8.0, 8.0, 8.0, 2.0]]

[solve]
n_quad = 4
l_ec = 2.0
rhs_tol = 1e-2
lhs_tol = 1e-6
gmres_rtol = 1e-8
support_rtol = 1e-6
volume_tol = 1e-8
max_order = 8
max_depth = 128

[batching]
n_centers_per_batch = 1

[eval]
far_pad_steps = 2.0
